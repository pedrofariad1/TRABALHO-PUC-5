<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FG COMPUTADORES</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- HEADER -->
<header class="bg-dark text-white p-3">

    <div class="container">

        <div class="row align-items-center">

            <!-- Logo -->
            <div class="col-md-4 text-center text-md-start">
                <h1 class="h3">FG COMPUTADORES</h1>
            </div>

            <!-- Busca -->
            <div class="col-md-4">
                <form class="d-flex">
                    <input class="form-control me-2" type="text" placeholder="Pesquise aqui...">
                    <button class="btn btn-primary" type="submit">
                        Enviar
                    </button>
                </form>
            </div>

            <!-- Menu -->
            <div class="col-md-4 text-center text-md-end">

                <nav class="nav justify-content-center justify-content-md-end">

                    <a class="nav-link text-white" href="#">
                        Home
                    </a>

                    <a class="nav-link text-white"
                        href="https://www.instagram.com/fg.computadores/">
                        Contato
                    </a>

                    <a class="nav-link text-white"
                        href="https://www.olx.com.br/perfil/pedro-faria-18c19cff">
                        Produtos
                    </a>

                </nav>

            </div>

        </div>

    </div>

</header>

<!-- BANNER -->
<section class="bg-primary text-white text-center p-5">

    <div class="container">

        <h2>A MELHOR DO BRASIL!</h2>

    </div>

</section>

<section class="container my-5">

    <h3 class="text-center mb-4">
        PRODUTOS
    </h3>

    <!-- CONTROLES -->
    <div class="row mb-4">

        <div class="col-md-4">
            <input id="search" class="form-control" placeholder="Buscar produto...">
        </div>

        <div class="col-md-4">
            <select id="category" class="form-select">
                <option value="Todas">Todas</option>
            </select>
        </div>

        <div class="col-md-4">
            <button id="btnRender" class="btn btn-primary w-100">
                Renderizar
            </button>
        </div>

    </div>

    <!-- LISTA (JS vai preencher) -->
    <div id="product-list" class="row g-4"></div>

    <!-- DETALHES -->
    <div id="product-details" class="mt-5"></div>

</section>

<!-- FORMULARIO -->
<section class="bg-light p-5">

    <div class="container text-center">

        <h2>
            FORMULARIO
        </h2>

        <p>
            Insira seu email para mais informações...
        </p>

        <form class="row justify-content-center">

            <div class="col-md-6">

                <input type="email"
                    class="form-control mb-3"
                    placeholder="Digite seu email">

                <button class="btn btn-primary">
                    Enviar
                </button>

            </div>

        </form>

    </div>

</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3">

    <a class="text-white"
        href="https://www.instagram.com/fg.computadores/">
        Redes sociais
    </a>

    <p class="mb-0">
        Telefone para suporte: 31 9 8766-5666
    </p>

</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>

</html>
